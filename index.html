<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <title>Home</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
</head>

<body>

    <div id="navbar"></div>

    <!-- HERO -->
    <section class="bg-primary text-white d-flex align-items-center" style="min-height: 100vh;">
        <div class="container">
            <div class="row align-items-center">

                <!-- KIRI (TEXT) -->
                <div class="col-md-6">
                    <h1 class="fw-bold display-5">
                        Laundry Bersih, Wangi, <br> Free Antar Jemput
                    </h1>

                    <p class="mt-3">
                        Solusi laundry cepat, higienis, dan terpercaya untuk kebutuhan harian kamu.
                    </p>

                    <div class="mt-4">
                        <a href="https://wa.me/628123456789" class="btn me-2 text-white"
                            style="background-color:#0d3b66;">
                            Pesan via WhatsApp
                        </a>

                        <a href="harga.html" class="btn btn-light">
                            Lihat Harga
                        </a>
                    </div>
                </div>

                <!-- KANAN (GAMBAR) -->
                <div class="col-md-6 text-center">
                    <img src="https://dutaserviceac.com/wp-content/uploads/2023/03/rekomendasi-mesin-cuci-laundry.webp"
                        class="img-fluid rounded shadow">
                </div>

            </div>
        </div>
    </section>

    <div id="footer"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        function loadComponent(id, file) {
            fetch(file).then(res => res.text()).then(data => {
                document.getElementById(id).innerHTML = data;
            });
        }
        loadComponent("navbar", "components/navbar.html");
        loadComponent("footer", "components/footer.html");
    </script>

</body>

</html>
