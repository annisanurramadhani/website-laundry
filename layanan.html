<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Layanan</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
</head>

<body>

    <div id="navbar"></div>

<section class="py-5 text-center d-flex flex-grow-1" style="min-height:100vh;">        <div class="container my-5">
            <h2 class="fw-bold mb-2">Layanan Laundry Kami</h2>
            <p class="mb-4">Kami menyediakan berbagai layanan laundry sesuai kebutuhan anda.</p>

            <div class="row g-4">

                <!-- 1 -->
                <div class="col-md-3">
                    <div class="card p-4 shadow-sm h-100">
                        <i class="bi bi-basket fs-1 text-primary mb-3"></i>
                        <h5>Laundry Kiloan</h5>
                        <p class="small">Cuci kiloan cepat dan bersih.</p>
                    </div>
                </div>

                <!-- 2 -->
                <div class="col-md-3">
                    <div class="card p-4 shadow-sm h-100">
                        <i class="bi bi-lightning-charge fs-1 text-warning mb-3"></i>
                        <h5>Laundry Express</h5>
                        <p class="small">Selesai dalam hitungan jam.</p>
                    </div>
                </div>

                <!-- 3 -->
                <div class="col-md-3">
                    <div class="card p-4 shadow-sm h-100">
                        <i class="bi bi-person fs-1 text-success mb-3"></i>
                        <h5>Laundry Satuan</h5>
                        <p class="small">Untuk pakaian spesial kamu.</p>
                    </div>
                </div>

                <!-- 4 -->
                <div class="col-md-3">
                    <div class="card p-4 shadow-sm h-100">
                        <i class="bi bi-stars fs-1 text-danger mb-3"></i>
                        <h5>Cuci + Setrika</h5>
                        <p class="small">Rapi, wangi, siap pakai.</p>
                    </div>
                </div>

            </div>

        </div>
    </section>

    <div id="footer"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        function loadComponent(id, file) {
            fetch(file)
                .then(res => res.text())
                .then(data => {
                    document.getElementById(id).innerHTML = data;
                });
        }

        loadComponent("navbar", "components/navbar.html");
        loadComponent("footer", "components/footer.html");
    </script>

</body>

</html>
